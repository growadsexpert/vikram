<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Expert</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0b1c2c;
    color: #fff;
    text-align: center;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #ff7a00, #ffb347);
    padding: 40px 20px;
    border-radius: 20px;
    margin: 20px;
}

.profile {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid white;
}

.name {
    font-size: 28px;
    font-weight: 700;
    margin-top: 10px;
}

.badges {
    margin-top: 10px;
}

.badge {
    display: inline-block;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    font-size: 14px;
}

/* BUTTON */
.join-btn {
    margin: 20px;
}

.join-btn a {
    display: block;
    padding: 15px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 20px;
    font-weight: bold;
    background: linear-gradient(90deg, #4facfe, #ff4e50);
    color: #fff;
}

/* FEATURES */
.features {
    margin: 20px;
}

.card {
    background: #132c44;
    padding: 15px;
    margin: 15px;
    border-radius: 15px;
    text-align: left;
}

.card h3 {
    margin-bottom: 5px;
}

.footer {
    margin-top: 20px;
    padding: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
    <img src="vikram.jpeg" class="profile">
    <div class="name">vikram </div>

    <div class="badges">
        <span class="badge">🏆 Sports Expert</span>
        <span class="badge">⭐ Verified Pro</span>
    </div>
</div>

<div class="join-btn">
    <a href="https://t.me/+zRB4r9sVu705YTg1">✅ Join Telegram</a>
</div>

<div class="features">
    <div class="card">
        <h3>✔ Expert Analysis</h3>
        <p>In-depth Sports Insights</p>
    </div>

    <div class="card">
        <h3>📊 Daily Updates</h3>
        <p>Stay informed always</p>
    </div>

    <div class="card">
        <h3>🤝 Community Support</h3>
        <p>Learn & Grow Together</p>
    </div>
</div>

<div class="footer">
    © 2026 - Building a Passionate Sports Community
</div>

</body>
</html>
